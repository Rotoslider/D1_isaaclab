# rl_sar deploy config for OUR Isaac Lab AMP policy `amprough01` (terrain-hardened, warm-started from cmdcond01)
# (run 2026-07-21_06-10-03_amprough01, model_12998, exported 2026-07-21).
# Schema mirrors Frank's policy/d1/robot_lab/config.yaml; every value below is
# what THIS policy was trained with — verified empirically (export_deploy.py probe):
#   - obs order per frame: ang_vel, gravity_vec, commands, dof_pos, dof_vel, actions
#   - history: 6 frames, TERM priority (each term's history contiguous), OLDEST first
#   - joint order (obs AND actions): FR, FL, RR, RL x (hip, thigh, calf)
#   - ONNX: input [1,270], output [1,12], parity vs JIT 1.4e-5
# joint_mapping identity assumed — MUST be validated in rl_sar MuJoCo sim2sim
# before hardware (as must the history flags — this file is staged, not proven).

d1/lab_amprough01:
  model_name: "policy_onnx.onnx"
  num_observations: 45
  observations: ["ang_vel", "gravity_vec", "commands", "dof_pos", "dof_vel", "actions"]
  observations_history: [5, 4, 3, 2, 1, 0]  # 0 is the latest; oldest-first layout
  observations_history_priority: "term"     # Isaac Lab flattens per-term, not per-frame
  clip_obs: 100.0
  clip_actions_lower: [-100.0, -100.0, -100.0,
                       -100.0, -100.0, -100.0,
                       -100.0, -100.0, -100.0,
                       -100.0, -100.0, -100.0]
  clip_actions_upper: [100.0, 100.0, 100.0,
                       100.0, 100.0, 100.0,
                       100.0, 100.0, 100.0,
                       100.0, 100.0, 100.0]
  # joint order everywhere below: FR_hip, FR_thigh, FR_calf, FL_hip, FL_thigh,
  # FL_calf, RR_hip, RR_thigh, RR_calf, RL_hip, RL_thigh, RL_calf
  rl_kp: [50.0, 55.0, 55.0,
          50.0, 55.0, 55.0,
          50.0, 55.0, 55.0,
          50.0, 55.0, 55.0]
  rl_kd: [3.2, 3.5, 3.5,
          3.2, 3.5, 3.5,
          3.2, 3.5, 3.5,
          3.2, 3.5, 3.5]
  fixed_kp: [50.0, 55.0, 55.0,
             50.0, 55.0, 55.0,
             50.0, 55.0, 55.0,
             50.0, 55.0, 55.0]
  fixed_kd: [3.2, 3.5, 3.5,
             3.2, 3.5, 3.5,
             3.2, 3.5, 3.5,
             3.2, 3.5, 3.5]
  num_of_dofs: 12
  # effective training scale: robot_lab action_scale 0.25 with hip 0.075
  # (Frank D1RoughCfg 0.25 * hip_reduction 0.3 — NOT the 0.35/0.55/0.80 AMP-deploy set)
  action_scale: [0.075, 0.25, 0.25,
                 0.075, 0.25, 0.25,
                 0.075, 0.25, 0.25,
                 0.075, 0.25, 0.25]
  wheel_indices: []
  # our obs scales: ang_vel 0.25, everything else 1.0 except dof_vel 0.05;
  # commands enter UNSCALED (robot_lab velocity_commands scale=1.0 — differs
  # from Frank's commands_scale [2,2,0.25]!)
  lin_vel_scale: 2.0
  ang_vel_scale: 0.25
  dof_pos_scale: 1.0
  dof_vel_scale: 0.05
  commands_scale: [1.0, 1.0, 1.0]
  torque_limits: [50.0, 50.0, 50.0,
                  50.0, 50.0, 50.0,
                  50.0, 50.0, 50.0,
                  50.0, 50.0, 50.0]
  default_dof_pos: [0.0500, -0.7500, -0.7500,
                   -0.0500, -0.7500, -0.7500,
                    0.0500, -0.7500, -0.7500,
                   -0.0500, -0.7500, -0.7500]
  # policy slots are FR,FL,RR,RL but the MJCF/hardware actuators are FL,FR,RL,RR —
  # joint_mapping[i] = actuator index for policy slot i (leg-pair swap)
  joint_mapping: [3, 4, 5, 0, 1, 2, 9, 10, 11, 6, 7, 8]
